name: Release

# Builds the `failure` binary for every platform install.sh/install.ps1 know
# how to fetch, then publishes them as a GitHub Release. install.sh/.ps1
# resolve binaries via `releases/latest/download/<asset>`, so this workflow
# is what makes that URL resolve to something real.
#
# Trigger by pushing a tag like `v0.1.220-alpha.4` (the `v` is stripped to
# get the version used in asset names / the channel-pointer files), or run
# manually via workflow_dispatch with an explicit version.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (no leading v), e.g. 0.1.220-alpha.4"
        required: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-14
            platform: macos-aarch64
          - os: windows-latest
            platform: windows-x86_64
          - os: ubuntu-latest
            platform: android-aarch64
            android: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install protoc (Linux)
        # protoc runs at build time on the host (codegen, not part of the
        # compiled output), so this also covers the Android cross-compile leg
        # — its host OS is still ubuntu-latest.
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Android NDK target
        if: matrix.android
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --locked

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install protoc -y
          # Chocolatey shims land in a dir that's already on PATH for new
          # processes, but build.rs's $PROTOC fallback is more reliable than
          # depending on that PATH refresh landing before the next step.
          $protoc = Get-Command protoc.exe -ErrorAction SilentlyContinue
          if (-not $protoc) {
            $protoc = Get-ChildItem "C:\ProgramData\chocolatey\lib\protoc\tools\bin\protoc.exe" -ErrorAction SilentlyContinue
          }
          if (-not $protoc) { throw "protoc.exe not found after choco install" }
          $protocPath = $protoc.Source ?? $protoc.FullName
          Write-Host "Found protoc at $protocPath"
          echo "PROTOC=$protocPath" >> $env:GITHUB_ENV

      - name: Build release binary
        if: '!matrix.android'
        # MSVC's link.exe hits "LNK4319: A PDB limit was hit" on this
        # workspace's release binary — too many/too-long symbol names for one
        # PDB. /DEBUG:LongSymbolTruncate is link.exe's own suggested fix (see
        # the LNK4318 warning); it truncates long names instead of dropping
        # debug info outright, so this doesn't affect Linux/macOS or disable
        # symbolication for crash reporting.
        env:
          RUSTFLAGS: ${{ runner.os == 'Windows' && '-C link-arg=/DEBUG:LongSymbolTruncate' || '' }}
        run: cargo build --release -p xai-grok-pager-bin

      - name: Work around NDK libgcc removal
        if: matrix.android
        # NDK r23+ dropped libgcc.a (replaced by libunwind/compiler-rt), but
        # rustc's aarch64-linux-android target spec still emits `-lgcc` at the
        # final link step, and ld.lld (unlike bfd) doesn't shim it — see
        # rust-lang/rust#85806. Standard workaround: a fake libgcc.a that's
        # just a linker script redirecting to `-lunwind`, on the search path.
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/android-libgcc-workaround"
          echo "INPUT(-lunwind)" > "$RUNNER_TEMP/android-libgcc-workaround/libgcc.a"
          echo "RUSTFLAGS=-L$RUNNER_TEMP/android-libgcc-workaround" >> "$GITHUB_ENV"

      - name: Build release binary (Android)
        if: matrix.android
        # cross-compiles via the NDK toolchain; output lands under
        # target/aarch64-linux-android/release/, not the native target/release/
        # that the other legs use. API level 24 matches Termux's own minimum.
        #
        # No ANDROID_NDK_HOME override here: ubuntu-latest already has
        # ANDROID_NDK_ROOT set correctly in the real process environment, and
        # cargo-ndk auto-detects it. `${{ env.X }}` only reads GitHub Actions'
        # own env context (workflow-defined `env:` blocks), not OS-level
        # runner env vars — referencing an unset one there yields an empty
        # string, which then incorrectly overrides the good value instead of
        # leaving it alone.
        run: cargo ndk --target aarch64-linux-android --platform 24 -- build --release -p xai-grok-pager-bin

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows' && !matrix.android
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/xai-grok-pager "dist/failure-${{ matrix.platform }}"

      - name: Stage artifact (Android)
        if: matrix.android
        shell: bash
        run: |
          mkdir -p dist
          cp target/aarch64-linux-android/release/xai-grok-pager "dist/failure-${{ matrix.platform }}"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/xai-grok-pager.exe "dist/failure-${{ matrix.platform }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: failure-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    # Android is the newest, least-proven leg — if it fails, still publish
    # the four platforms that did build rather than blocking the whole
    # release on it (download-artifact below just works with whatever
    # artifacts exist).
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: staging
          merge-multiple: true

      - name: Rename assets to failure-<version>-<platform> and write channel pointers
        shell: bash
        run: |
          set -e
          version="${{ steps.version.outputs.version }}"
          mkdir -p dist
          for f in staging/*; do
            name="$(basename "$f")"
            # name is "failure-<platform>" or "failure-<platform>.exe"
            mv "$f" "dist/${name/failure-/failure-${version}-}"
          done
          echo -n "$version" > dist/stable
          echo -n "$version" > dist/alpha

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/*
